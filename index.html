<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SISCOF — Sistema de Control Fronterizo</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/siscof.css" />

  <!-- Supabase JS desde CDN (no requiere npm) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- Splash inicial mientras carga -->
  <div id="splash" style="
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:1rem;
    font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:8px; color:#00ff88;
  ">
    SISCOF
    <span style="font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:4px;color:#2a3040">
      CARGANDO SISTEMA...
    </span>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       SCRIPTS — se cargan en orden estricto
       ═══════════════════════════════════════════════════════ -->

  <!-- 1. Configuración (complete las credenciales aquí) -->
  <script src="js/config.js"></script>

  <!-- 2. Core: cliente Supabase + estado global + helpers -->
  <script src="js/core.js"></script>

  <!-- 3. Páginas -->
  <script src="js/pages/login.js"></script>
  <script src="js/pages/app.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/registro.js"></script>

  <!-- 4. Arranque -->
  <script>
    (async () => {
      // Verificar credenciales antes de arrancar
      if (!SISCOF_CONFIG.SUPABASE_URL || !SISCOF_CONFIG.SUPABASE_ANON_KEY) {
        document.getElementById('splash').innerHTML = `
          <div style="text-align:center;font-family:'IBM Plex Mono',monospace;color:#ff3b3b;font-size:1rem;max-width:480px;padding:2rem">
            <div style="font-size:2rem;margin-bottom:1rem">⚠</div>
            <strong>CREDENCIALES NO CONFIGURADAS</strong><br><br>
            Edite el archivo <code style="background:#1e2430;padding:2px 6px;border-radius:3px">js/config.js</code>
            y complete los campos:<br><br>
            <code style="background:#1e2430;padding:4px 10px;border-radius:3px;display:block;margin:8px 0">SUPABASE_URL</code>
            <code style="background:#1e2430;padding:4px 10px;border-radius:3px;display:block;margin:8px 0">SUPABASE_ANON_KEY</code>
            <br>
            Luego suba los cambios a GitHub y recargue.
          </div>
        `
        return
      }

      // Intentar restaurar sesión existente
      try {
        const sesionActiva = await iniciarSesion()
        document.getElementById('splash').remove()
        if (sesionActiva) renderApp()
        else renderLogin()
      } catch (e) {
        document.getElementById('splash').innerHTML = `
          <div style="text-align:center;font-family:'IBM Plex Mono',monospace;color:#ff3b3b;font-size:.85rem;max-width:480px;padding:2rem">
            <div style="font-size:2rem;margin-bottom:1rem">⚠</div>
            <strong>ERROR DE CONEXIÓN</strong><br><br>
            ${e.message}<br><br>
            Verifique las credenciales en <code style="background:#1e2430;padding:2px 6px">js/config.js</code>
          </div>
        `
      }
    })()
  </script>

</body>
</html>
