<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SISCOF — Sistema de Control Fronterizo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/siscof.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <div id="splash" style="
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:1rem; background:#f5f5f7;
    font-family:'DM Sans',sans-serif;
  ">
    <img src="img/escudo-carabineros.png" alt="Carabineros de Chile"
      style="width:72px;filter:drop-shadow(0 4px 12px rgba(26,107,42,.3))"
      onerror="this.style.display='none'" />
    <div style="font-size:1.6rem;font-weight:700;letter-spacing:-.5px;color:#1d1d1f">SISCOF</div>
    <div style="font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:3px;color:#6e6e73">
      CARGANDO SISTEMA...
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/core.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/app.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/registro.js"></script>

  <script>
    (async () => {
      if (!SISCOF_CONFIG.SUPABASE_URL || !SISCOF_CONFIG.SUPABASE_ANON_KEY) {
        document.getElementById('splash').innerHTML = `
          <div style="text-align:center;font-family:'DM Mono',monospace;color:#d70015;font-size:.9rem;max-width:480px;padding:2rem">
            <div style="font-size:2rem;margin-bottom:1rem">⚠</div>
            <strong>CREDENCIALES NO CONFIGURADAS</strong><br><br>
            Edite el archivo <code style="background:#f0f0f2;padding:2px 6px;border-radius:4px">js/config.js</code>
            y complete:<br><br>
            <code style="background:#f0f0f2;padding:4px 10px;border-radius:4px;display:block;margin:8px 0">SUPABASE_URL</code>
            <code style="background:#f0f0f2;padding:4px 10px;border-radius:4px;display:block;margin:8px 0">SUPABASE_ANON_KEY</code>
          </div>`
        return
      }
      try {
        const sesionActiva = await iniciarSesion()
        document.getElementById('splash').remove()
        if (sesionActiva) renderApp()
        else renderLogin()
      } catch (e) {
        document.getElementById('splash').innerHTML = `
          <div style="text-align:center;font-family:'DM Mono',monospace;color:#d70015;font-size:.85rem;max-width:480px;padding:2rem">
            <div style="font-size:2rem;margin-bottom:1rem">⚠</div>
            <strong>ERROR DE CONEXIÓN</strong><br><br>${e.message}
          </div>`
      }
    })()
  </script>
</body>
</html>
